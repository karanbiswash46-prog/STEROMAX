<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteroMax Elite: FF Style Start Screen 🔊</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap');
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #050505; color: white;
            overflow: hidden;
            user-select: none;
        }

        /* 🎬 FULL SCREEN VIDEO BACKGROUNDS 🎬 */
        .video-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            background-color: #050505;
        }
        
        .video-container video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
            pointer-events: none; 
        }

        #introVideo { z-index: 2; opacity: 1; }
        #loopVideo { z-index: 1; opacity: 1; }

        .video-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 45%;
            background: linear-gradient(to top, rgba(5,5,5,1) 0%, rgba(5,5,5,0.7) 40%, transparent 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* 🔘 THE FF STYLE START SCREEN 🔘 */
        .start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); /* Thoda dark overlay taaki button highlight ho */
            backdrop-filter: blur(8px);
            z-index: 50; /* Sabse upar */
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }

        /* Premium Pulsing Button */
        .start-btn {
            width: 140px; height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(138,3,3,0.8), rgba(20,0,0,0.9));
            border: 2px solid #ff3333;
            color: #ffcc00;
            font-size: 16px; font-weight: 900; letter-spacing: 1px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6), inset 0 0 15px rgba(255, 0, 0, 0.4);
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }
        
        .start-btn span { font-size: 10px; color: #fff; margin-top: 5px; opacity: 0.8;}

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(255, 0, 0, 0.9); }
            100% { transform: scale(0.95); box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); }
        }

        /* ⏳ THE UI DASHBOARD ⏳ */
        .event-ui-dashboard {
            position: absolute;
            bottom: 40px; left: 0; width: 100%;
            z-index: 10;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            padding: 0 20px;
            box-sizing: border-box;
            opacity: 0;
            transform: translateY(60px);
            transition: all 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .event-ui-dashboard.show-ui {
            opacity: 1;
            transform: translateY(0);
        }

        /* Token Bubble */
        .token-bubble {
            background: radial-gradient(circle, #8a0303, #3a0000);
            border: 2px solid #ff3333;
            width: 70px; height: 70px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900;
            text-align: center; line-height: 1.2;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            flex-shrink: 0;
        }
        .token-bubble span { font-size: 18px; color: #ffcc00; }

        /* Progress Bar */
        .progress-wrapper {
            flex-grow: 1; position: relative;
            height: 14px; background: rgba(20,20,20,0.8);
            border-radius: 10px; border: 1px solid #444;
            backdrop-filter: blur(5px);
        }
        .progress-fill {
            width: 0%; 
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff8800);
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.8);
            transition: width 1.2s ease 0.6s; 
        }

        /* Markers */
        .marker {
            position: absolute; top: -15px;
            width: 15px; height: 15px;
            background: #111; border: 2px solid #666;
            border-radius: 50%; transform: translateX(-50%);
        }
        .marker.active { border-color: #00d2ff; background: #00d2ff; box-shadow: 0 0 10px #00d2ff;}
        .marker-30 { left: 30%; }
        .marker-60 { left: 60%; }
        .marker-100 { left: 100%; top: -20px; width: 20px; height: 20px; border-color: #ffcc00;}
        
    </style>
</head>
<body>

    <div class="video-container">
        <video id="introVideo" playsinline preload="auto">
            <source src="https://www.dropbox.com/scl/fi/3we2xdb80tp8s25w1t3mh/lv_0_20260523230710.mp4?rlkey=prldnkfbupi04d5pydpq3twwt&st=fzwv216k&raw=1" type="video/mp4">
        </video>
        <video id="loopVideo" playsinline loop preload="auto">
            <source src="https://www.dropbox.com/scl/fi/y7l251qpyy6yme5v6l739/Anime_villain_standing_beneath_e-_202605232301.mp4?rlkey=vtk680qpi405xt67ym77keuah&st=45ldnycn&raw=1" type="video/mp4">
        </video>
    </div>
    
    <div class="video-overlay"></div>

    <div class="start-screen" id="startScreen">
        <div class="start-btn" id="startBtn">
            START EVENT
            <span>TAP TO ENTER</span>
        </div>
    </div>

    <div class="event-ui-dashboard" id="mainUI">
        <div class="token-bubble">
            <span id="tokenCount">0</span> TOKENS
        </div>
        <div class="progress-wrapper">
            <div class="progress-fill" id="pBar"></div>
            <div class="marker marker-30"></div>
            <div class="marker marker-60"></div>
            <div class="marker marker-100"></div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const startScreen = document.getElementById('startScreen');
        const introVid = document.getElementById('introVideo');
        const loopVid = document.getElementById('loopVideo');
        
        // 🔥 Jab Start Button par click hoga, tab sab kuch shuru hoga 🔥
        startBtn.addEventListener('click', () => {
            
            // 1. Start screen aur button ko hide karo
            startScreen.style.opacity = '0';
            setTimeout(() => { startScreen.style.display = 'none'; }, 500);

            // 2. Videos ko sound ke sath Play karo!
            introVid.muted = false;
            loopVid.muted = false;
            introVid.play();
            loopVid.play();

            // 3. 12-Second UI Timer AB start hoga
            setTimeout(() => {
                document.getElementById('mainUI').classList.add('show-ui');
                
                setTimeout(() => {
                    document.getElementById('pBar').style.width = '30%';
                    document.querySelector('.marker-30').classList.add('active');
                    document.getElementById('tokenCount').innerText = '12';
                }, 600); 

            }, 12000); 
        });

        // Seamless video transition
        introVid.addEventListener('ended', () => {
            introVid.style.opacity = '0';
        });

    </script>

</body>
</html>
