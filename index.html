<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SteroMax - Server Moved</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&display=swap');
        
        body {
            /* Premium Dark Cinematic Background */
            background: linear-gradient(rgba(3, 3, 3, 0.85), rgba(3, 3, 3, 0.95)), 
                        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover fixed;
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Glassmorphism Premium Box */
        .notice-box {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 25px;
            max-width: 380px; 
            width: 100%;
            box-sizing: border-box; /* BORDER OVERFLOW FIX */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 51, 51, 0.15);
            animation: slideUp 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            border: 2px solid #111;
        }

        h1 {
            color: #ff3333;
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        p {
            color: #ddd;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .highlight {
            color: #00d2ff;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.4);
        }

        /* Animated Button */
        .redirect-btn {
            background: linear-gradient(90deg, #00d2ff, #bc4ed8, #00d2ff);
            background-size: 200% auto;
            color: black;
            border: none;
            padding: 18px 20px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            display: block;
            box-sizing: border-box; /* BORDER OVERFLOW FIX */
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            
            /* Double Animation: Tapping Pulse + Glowing Flow */
            animation: tapPulse 1.5s infinite, colorShine 3s infinite linear;
            transition: transform 0.2s;
        }

        .redirect-btn:active {
            transform: scale(0.95);
        }

        @keyframes slideUp {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Button ka zordaar Pulse animation */
        @keyframes tapPulse {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(188, 78, 216, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        }

        /* Button ke andar color ghumane wala magic */
        @keyframes colorShine {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <div class="notice-box">
        <img src="https://i.postimg.cc/YCmqvs25/logo-192-png.png" alt="SteroMax Logo" class="logo-img">
        <h1>Server Closed ⚠️</h1>
        <p>This old GitHub version of SteroMax is officially permanently closed.<br><br>
        We have migrated to the <span class="highlight">SteroMax Elite</span> servers for 4K streaming and Zero-Storage tech.</p>
        
        <a href="https://stero-max.web.app" class="redirect-btn">🚀 TAP TO GET ELITE APP</a>
    </div>

</body>
</html>
