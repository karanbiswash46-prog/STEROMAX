<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="dns-prefetch" href="//steromax.4meplayer.com">
    <title>Stero Max Pro - Elite Streaming</title>
    <style>
        :root { --primary: #00d2ff; --bg: #000000; --card: #121212; --text: #ffffff; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }

        header { background: #111; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { color: var(--primary); font-size: 22px; font-weight: 900; }

        /* Home UI Slider with Text */
        .slider-wrapper { position: relative; width: 95%; height: 210px; overflow: hidden; border-radius: 15px; margin: 15px auto; border: 1px solid #333; }
        .hero-slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 20px; position: relative; cursor: pointer; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .slide-content { position: relative; z-index: 10; }
        .trending-tag { background: red; color: white; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .movie-card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #222; text-align: center; }
        .movie-card img { width: 100%; height: 130px; object-fit: cover; }

        /* Details Modal */
        .player { display: none; position: fixed; inset: 0; background: #050505; z-index: 5000; flex-direction: column; overflow-y: auto; }
        .video-box { width: 100%; aspect-ratio: 16 / 9; background: #000; position: relative; }
        .close-info { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); border-radius: 50%; width: 40px; height: 40px; text-align:center; line-height:40px; color:white; z-index: 6000; font-weight:bold; cursor: pointer; }

        .p-content { padding: 20px; }
        .watch-btn { width: 100%; padding: 16px; background: #ff9900; border: none; border-radius: 30px; font-weight: 900; font-size: 16px; margin-bottom: 20px; color: #000; cursor: pointer; }

        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #222; margin-bottom: 15px; overflow-x: auto; scrollbar-width: none; }
        .tab { padding: 10px 0; font-weight: bold; font-size: 14px; color: #666; cursor: pointer; white-space: nowrap; }
        .tab.active { color: white; border-bottom: 3px solid var(--primary); }
        .tab-content { display: none; font-size: 14px; color: #bbb; line-height: 1.5; }
        .tab-content.active { display: block; }

        /* Comments UI Fixed */
        .comment-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-box input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .comment-box button { background: var(--primary); border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; color: #000; }

        /* FULLSCREEN CINEMATIC PLAYER FIX */
        .fs-player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; }
        .fs-header { width: 100%; padding: 15px; display: flex; justify-content: flex-end; position: absolute; top: 0; z-index: 10005; }
        .close-fs { background: rgba(255, 255, 255, 0.1); border-radius: 50%; width: 45px; height: 45px; text-align: center; line-height: 45px; color: white; font-size: 24px; font-weight: bold; cursor: pointer; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        
        .fs-video-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        iframe { width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 100vw; border: none; background: #000; }

        @media (orientation: landscape) { iframe { width: 100vw; height: 100vh; } }
    </style>
</head>
<body>

    <header>
        <div style="background:var(--gold); color:black; font-size:10px; font-weight:900; padding:5px 12px; border-radius:5px;">⭐ ELITE</div>
        <div class="logo">STEROMAX</div>
        <div style="font-size: 20px;">⚙️</div>
    </header>

    <div id="home">
        <div class="slider-wrapper">
            <div class="hero-slide" onclick="playMovie(3)" style="background-image: url('https://i.postimg.cc/HsGfn83z/filters-quality(95)format(webp).jpg');">
                <div class="slide-overlay"></div>
                <div class="slide-content">
                    <span class="trending-tag">🔥 TRENDING</span>
                    <p style="font-size:18px; font-weight:bold; margin:0;">Demon Slayer S1</p>
                </div>
            </div>
        </div>
        <h3 style="margin-left: 15px;">Must Watch</h3>
        <div class="grid" id="movie-grid"></div>
    </div>

    <div id="playerModal" class="player">
        <div class="close-info" onclick="closeInfoPage()">✕</div>
        <div class="video-box">
            <video id="introVideo" playsinline autoplay controls style="width:100%; height:100%;">
                <source src="" id="introSource" type="video/mp4">
            </video>
        </div>
        <div class="p-content">
            <h2 id="p-title"></h2>
            <button class="watch-btn" id="movieBtn">▶ WATCH FULL MOVIE</button>
            <div class="tabs">
                <div class="tab active" onclick="switchTab(0)">Details</div>
                <div class="tab" id="ep-tab-head" onclick="switchTab(1)">Episodes</div>
                <div class="tab" onclick="switchTab(2)">Comments</div>
                <div class="tab" onclick="switchTab(3)">Poster</div>
            </div>

            <div id="tab-details" class="tab-content active">
                <p id="movie-desc"></p>
                <h3 style="color:var(--primary); margin-top:20px;">Recommended for You</h3>
                <div class="grid" id="sim-grid"></div>
            </div>

            <div id="tab-episodes" class="tab-content"><div id="ep-container"></div></div>

            <div id="tab-comments" class="tab-content">
                <div class="comment-box">
                    <input type="text" id="userComment" placeholder="Write a comment...">
                    <button onclick="addComment()">Post</button>
                </div>
                <div id="comments-list"></div>
            </div>

            <div id="tab-poster" class="tab-content">
                <div id="trailer-poster" style="width:100%; height:200px; border-radius:12px; background-size:cover; background-position:center; border:1px solid #333;"></div>
                <div style="margin-top:15px; background:#111; padding:15px; border-radius:10px;">
                    <p><b>Quality:</b> <span style="color:var(--gold);">4K Ultra HD</span></p>
                    <p><b>Audio:</b> Hindi / Japanese</p>
                    <p><b>Status:</b> Completed</p>
                    <p><b>Studio:</b> SteroMax Elite</p>
                </div>
            </div>
        </div>
    </div>

    <div id="fsPlayerModal" class="fs-player-overlay">
        <div class="fs-header"><div class="close-fs" onclick="closeEpisode()">✕</div></div>
        <div class="fs-video-container">
            <iframe id="episodeFrame" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

    <script>
        const movies = [
            { id: 1, title: "Infinity Castle", type: "movie", img: "https://i.postimg.cc/DwfGrBHM/kv-1.jpg", trailerLink: "https://www.dropbox.com/scl/fi/cmiemscnlidr0iszlal4z/Demon_Slayer__Kimetsu_no_Yaiba_Infinity_Castle___MAIN_TRAILER-1080p.mp4?rlkey=wy1z8i6bjh6janpqk2xaq5a32&raw=1", desc: "The final battle begins at Infinity Castle.", comments: ["Wait is over!", "Epic animation."] },
            { id: 2, title: "Pushpa 2", type: "movie", img: "https://i.postimg.cc/XN1cpNX1/Pushpa-2.jpg", trailerLink: "https://www.dropbox.com/scl/fi/8ml1gt55dbwso60vgvrpg/Pushpa_2_-_The_Rule_Trailer__Hindi____Allu_Arjun___Sukumar___Rashmika_Mandanna___Fahadh_Faasil___DSP-1080p.mp4?rlkey=2b1euqnm0grgktur01br1lv1g&raw=1", desc: "Pushpa Raj returns to rule.", comments: ["Jhukega nahi saala! 🔥"] },
            { 
                id: 3, title: "Demon Slayer S1", type: "series", img: "https://i.postimg.cc/HsGfn83z/filters-quality(95)format(webp).jpg", 
                trailerLink: "https://www.dropbox.com/scl/fi/i2fsl28a3p8r5do86bhwu/Demon_Slayer___OP____Gurenge__by_LiSA_HD-1080p.mp4?rlkey=pe9xi0ivfsg7fx6to2z30qtv9&raw=1",
                desc: "Tanjiro's journey to save Nezuko begins.",
                episodes: [{ title: "Episode 1: Cruelty (Hindi Dub)", embed: "https://steromax.4meplayer.com/#6rsmm", thumb: "https://i.postimg.cc/BnXvh3w2/Screenshot-2026-04-15-22-25-36-63-40deb401b9ffe8e1df2f1cc5ba480b12.jpg" }],
                comments: ["Bhai kya mast dubbing hai!", "VidHide player is very fast."]
            }
        ];

        let currentMovie = null;
        const introVideo = document.getElementById('introVideo');

        function playMovie(id) {
            currentMovie = movies.find(x => x.id === id);
            document.getElementById('p-title').innerText = currentMovie.title;
            document.getElementById('movie-desc').innerText = currentMovie.desc;
            document.getElementById('trailer-poster').style.backgroundImage = `url('${currentMovie.img}')`;
            document.getElementById('introSource').src = currentMovie.trailerLink;
            introVideo.load(); introVideo.play();
            
            if(currentMovie.type === "series") {
                document.getElementById('ep-tab-head').style.display = "block";
                document.getElementById('movieBtn').style.display = "none";
                const epList = document.getElementById('ep-container'); epList.innerHTML = '';
                currentMovie.episodes.forEach((e, i) => {
                    epList.innerHTML += `<div style="display:flex; align-items:center; gap:12px; background:#111; padding:12px; border-radius:10px; margin-bottom:8px; border:1px solid #222;" onclick="openEpisodeFullscreen(${i})"><div style="width:80px; height:45px; border-radius:5px; overflow:hidden;"><img src="${e.thumb}" style="width:100%;height:100%;object-fit:cover"></div><b>${e.title}</b></div>`;
                });
            } else { document.getElementById('ep-tab-head').style.display = "none"; document.getElementById('movieBtn').style.display = "block"; }
            
            updateComments();
            document.getElementById('playerModal').style.display = 'flex';
            switchTab(0); renderGrid(movies, 'sim-grid'); // Recommended Grid
        }

        function openEpisodeFullscreen(i) {
            introVideo.pause();
            const elem = document.getElementById("fsPlayerModal");
            document.getElementById('episodeFrame').src = currentMovie.episodes[i].embed;
            elem.style.display = 'block';

            if (elem.requestFullscreen) elem.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("landscape").catch(e => {});
            }
        }

        function closeEpisode() { 
            document.getElementById('episodeFrame').src = ""; 
            document.getElementById('fsPlayerModal').style.display = 'none'; 
            if (document.exitFullscreen) document.exitFullscreen().catch(e => {});
        }

        function addComment() {
            const input = document.getElementById('userComment');
            if(input.value.trim() !== "") {
                currentMovie.comments.unshift(input.value);
                input.value = "";
                updateComments();
            }
        }

        function updateComments() {
            const cList = document.getElementById('comments-list'); cList.innerHTML = '';
            currentMovie.comments.forEach(c => { cList.innerHTML += `<div style="background:#111; padding:12px; border-radius:8px; margin-bottom:10px; border-left:3px solid var(--primary);"><b>User:</b> ${c}</div>`; });
        }

        function switchTab(idx) { 
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx)); 
            document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx)); 
        }

        function closeInfoPage() { introVideo.pause(); document.getElementById('playerModal').style.display = 'none'; }
        function renderGrid(data, target) {
            const grid = document.getElementById(target); grid.innerHTML = '';
            data.forEach(m => { grid.innerHTML += `<div class="movie-card" onclick="playMovie(${m.id})"><img src="${m.img}"><p style="font-size:9px; margin:5px;">${m.title}</p></div>`; });
        }
        renderGrid(movies, 'movie-grid');
    </script>
</body>
</html>
