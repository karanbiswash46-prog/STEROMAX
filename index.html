<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteroMax Elite: 100% Profile Entry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap');
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #050505; color: white;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* ==========================================
           LAYER 1: THE POSTER / LOGO ENTRY (Top Layer)
           ========================================== */
        .poster-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
            transition: opacity 1s ease; /* Fade out effect */
        }
        .poster-layer img {
            width: 250px; /* Logo ka size */
            animation: pulseLogo 1.5s infinite;
        }
        @keyframes pulseLogo {
            0% { transform: scale(0.95); filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(255, 0, 0, 1)); }
            100% { transform: scale(0.95); filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.5)); }
        }

        /* ==========================================
           LAYER 2: THE VILLAIN ENTRY VIDEO (Middle Layer)
           ========================================== */
        .video-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #050505;
            z-index: 50;
            transition: opacity 1.5s ease; /* Smooth fade out for video */
        }
        .video-layer video {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* ==========================================
           LAYER 3: THE REAL PROFILE (Bottom Layer)
           ========================================== */
        .real-profile-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
            background: radial-gradient(circle, #2a0000 0%, #050505 80%); /* Dynamic dark aura */
        }
        .profile-card {
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid #330000;
            border-radius: 20px;
            padding: 40px;
            width: 85%; max-width: 350px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        /* 30% Ring Setup */
        .avatar-wrapper { position: relative; width: 220px; height: 220px; display: flex; justify-content: center; align-items: center; }
        .profile-dp { position: absolute; width: 135px; height: 135px; border-radius: 50%; object-fit: cover; z-index: 1; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }
        .profile-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/BvK28VB4/file-0000000076ec7208a7a835f4e5c80f3d.png') no-repeat center center;
            background-size: contain; z-index: 2; pointer-events: none; mix-blend-mode: screen; filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.4));
        }

        /* Profile Text */
        .user-name { margin-top: 25px; font-size: 24px; font-weight: 900; color: #ff3333; text-shadow: 0 0 10px rgba(255, 0, 0, 0.5); text-transform: uppercase;}
        .user-title { color: #ffcc00; font-size: 14px; font-weight: 800; margin-top: 5px; letter-spacing: 2px; }
        
        .stats-container { display: flex; justify-content: space-around; width: 100%; margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; }
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-value { font-size: 20px; font-weight: 900; color: white; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 5px;}
        
    </style>
</head>
<body>

    <div class="poster-layer" id="posterLayer">
        <img src="https://i.postimg.cc/MpjmWjhW/1779607797325.png" alt="SteroMax Elite Logo">
    </div>

    <div class="video-layer" id="videoLayer">
        <video id="entryVideo" autoplay muted playsinline>
            <source src="https://www.dropbox.com/scl/fi/th36r3azsfrj13opld4xv/Flow_202605241254.mp4?rlkey=ohd2jza3ynz1fool3zibxoevu&st=jpxabu1w&raw=1" type="video/mp4">
        </video>
    </div>

    <div class="real-profile-layer">
        <div class="profile-card">
            <div class="avatar-wrapper">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150" class="profile-dp" alt="User Avatar">
                <div class="profile-frame"></div>
            </div>
            <div class="user-name">The Supreme</div>
            <div class="user-title">100% Elite Master</div>
            <div class="stats-container">
                <div class="stat-box"><div class="stat-value">100%</div><div class="stat-label">Event</div></div>
                <div class="stat-box"><div class="stat-value">MAX</div><div class="stat-label">Tokens</div></div>
                <div class="stat-box"><div class="stat-value">#1</div><div class="stat-label">Rank</div></div>
            </div>
        </div>
    </div>

    <script>
        const posterLayer = document.getElementById('posterLayer');
        const videoLayer = document.getElementById('videoLayer');
        const entryVideo = document.getElementById('entryVideo');

        // Step 1: 1.5 seconds baad Poster ko fade out karo
        setTimeout(() => {
            posterLayer.style.opacity = '0';
            
            // Fade out hone ke baad HTML se hata do taaki click block na ho
            setTimeout(() => {
                posterLayer.style.display = 'none';
            }, 1000); // CSS transition 1s ka hai
        }, 1500);

        // Step 2: Jaise hi Video khatam ho, usko fade out karke Profile reveal karo
        entryVideo.addEventListener('ended', () => {
            videoLayer.style.opacity = '0'; // Smooth fade out

            // Video ko hide kardo transition ke baad
            setTimeout(() => {
                videoLayer.style.display = 'none';
            }, 1500); // CSS transition 1.5s ka hai
        });

        // 🔊 Optional Sound Hack: Agar sound chahiye toh screen tap par unmute
        document.body.addEventListener('touchstart', () => {
            entryVideo.muted = false;
        }, { once: true });
        document.body.addEventListener('click', () => {
            entryVideo.muted = false;
        }, { once: true });

    </script>

</body>
</html>
