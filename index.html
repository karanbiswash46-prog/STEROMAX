<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SteroMax Pro v10</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        header { background: #111; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card { background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid #222; position: relative; }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        .card-info { padding: 5px; font-size: 10px; text-align: center; }
        .player-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; overflow-y: auto; }
        iframe { width: 100%; height: 250px; border: none; }
        .cmnt-box { padding: 15px; background: #111; border-top: 1px solid #333; }
        .cmnt-list { height: 200px; overflow-y: auto; padding: 10px; font-size: 12px; }
        .login-btn { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--primary); font-weight:bold;">STEROMAX ELITE</div>
    <div id="auth-section"><button class="login-btn" onclick="googleLogin()">Login</button></div>
</header>

<div id="home">
    <h3 style="margin-left:15px; color:red; font-size:14px;">🔴 LIVE TV</h3>
    <div class="grid" id="live-grid"></div>
    <h3 style="margin-left:15px; color:var(--primary); font-size:14px;">🔥 TRENDING MOVIES</h3>
    <div class="grid" id="movie-grid"></div>
</div>

<div id="player" class="player-modal">
    <div style="padding:15px; display:flex; justify-content:space-between; background:#111;">
        <span id="p-title">Playing...</span>
        <b onclick="closePlayer()">✕ Close</b>
    </div>
    <iframe id="ifr"></iframe>
    <div class="cmnt-box">
        <div class="cmnt-list" id="cmnt-display"></div>
        <input type="text" id="cmnt-input" placeholder="Write a comment..." style="width:75%; padding:10px; background:#222; border:none; color:#fff;">
        <button onclick="postComment()" style="width:20%; padding:10px; background:var(--primary); border:none;">Post</button>
    </div>
</div>

<script>
    // 🔥 TERA FIREBASE CONFIG (SAME)
    const firebaseConfig = {
      apiKey: "AIzaSyDFHIr_2W-jRr97x1HVY9tpyWaI2QqtY9E",
      authDomain: "stero-max.firebaseapp.com",
      projectId: "stero-max",
      storageBucket: "stero-max.firebasestorage.app",
      messagingSenderId: "101516996592",
      appId: "1:101516996592:web:7f90b3f4b9805bf74ab735"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const TMDB_KEY = "36157345f197f22bcad9f2039b77fd4f";
    let activeId = "";
    let userName = "Guest";

    async function init() {
        // Load Live TV
        document.getElementById('live-grid').innerHTML = `<div class="card" onclick="playMedia('https://cmvlive.blogspot.com/2026/02/str-1-hindi.html?m=1', 'IPL LIVE')"><img src="https://i.postimg.cc/tJ0vW9x3/tata-ipl-logo.jpg"><div class="card-info">IPL LIVE HINDI</div></div>`;
        
        // Load TMDB Posters
        const res = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB_KEY}`);
        const data = await res.json();
        const mGrid = document.getElementById('movie-grid');
        data.results.slice(0, 9).forEach(m => {
            mGrid.innerHTML += `<div class="card" onclick="playMedia('https://autoembed.to/movie/tmdb/${m.id}', '${m.title.replace(/'/g,"")}', '${m.id}')"><img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><div class="card-info">${m.title}</div></div>`;
        });
    }

    function playMedia(url, title, id) {
        activeId = id || "live";
        document.getElementById('p-title').innerText = title;
        document.getElementById('ifr').src = url;
        document.getElementById('player').style.display = 'flex';
        loadComments();
        if(screen.orientation) screen.orientation.lock("landscape").catch(e=>{});
    }

    function closePlayer() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('ifr').src = "";
        if(screen.orientation) screen.orientation.unlock();
    }

    // 👤 GOOGLE LOGIN
    function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(res => {
            userName = res.user.displayName;
            document.getElementById('auth-section').innerHTML = `<img src="${res.user.photoURL}" style="width:30px; border-radius:50%;">`;
        });
    }

    // 💬 COMMENTS SYSTEM
    function loadComments() {
        db.collection("comments").where("mid", "==", activeId).orderBy("time", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => { html += `<p><b>${doc.data().user}:</b> ${doc.data().text}</p>`; });
            document.getElementById('cmnt-display').innerHTML = html || "No comments yet. Be first!";
        });
    }

    function postComment() {
        const text = document.getElementById('cmnt-input').value;
        if(!text) return;
        db.collection("comments").add({ mid: activeId, user: userName, text: text, time: Date.now() });
        document.getElementById('cmnt-input').value = "";
    }

    window.onload = init;
</script>
</body>
</html>
