<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteroMax - Premium Upgrade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&display=swap');
        body {
            margin: 0; padding: 0; background-color: #050505; color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            /* Demon Slayer Premium Background */
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://i.postimg.cc/DwfGrBHM/kv-1.jpg');
            background-size: cover; background-position: center;
        }
        .alert-box {
            background: rgba(15, 15, 15, 0.8); border: 2px solid #00d2ff;
            padding: 40px 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); max-width: 400px; width: 85%;
            backdrop-filter: blur(15px); position: relative; overflow: hidden;
        }
        .alert-box::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, #ff0000, #ffcc00, #00d2ff);
        }
        .icon { font-size: 50px; margin: 0 0 10px 0; animation: float 3s ease-in-out infinite; }
        h1 { color: #ffcc00; font-size: 22px; margin: 0 0 10px 0; text-transform: uppercase; font-weight: 900; letter-spacing: 1px;}
        p { color: #ccc; font-size: 13px; line-height: 1.6; margin-bottom: 25px; font-weight: 600;}
        .highlight { color: #00d2ff; font-weight: 900; }
        .btn {
            background: #00d2ff; color: black; text-decoration: none;
            padding: 16px 30px; font-weight: 900; border-radius: 30px;
            display: inline-block; text-transform: uppercase; letter-spacing: 1.5px;
            transition: 0.3s; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            width: 100%; box-sizing: border-box;
        }
        .btn:active { transform: scale(0.95); }
        .timer-text { font-size: 11px; margin-top: 20px; color: #888; font-weight: 600; text-transform: uppercase;}
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="alert-box">
        <div class="icon">🚀</div>
        <h1>GitHub Server Closed!</h1>
        <p>SteroMax has been upgraded to a <span class="highlight">Premium Server</span> for ultra-fast streaming, zero lag, and an ultimate anime experience.</p>
        
        <a href="https://stero-max.web.app" class="btn">ENTER NEW WEBSITE</a>
        
        <div class="timer-text">Auto-redirecting in <span id="timer" style="color: #00d2ff; font-size: 14px; font-weight: 900;">10</span> seconds...</div>
    </div>

    <script>
        let timeLeft = 10;
        setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                window.location.href = "https://stero-max.web.app";
            }
        }, 1000);
    </script>

</body>
</html>
